  <script>
    // Test rapido connessione Supabase con project ref corretto
    const { createClient } = supabase;
    const db = createClient("https://mozqrlpjqubgsnbgbthd.supabase.co", "sb_publishable_WRIrI4FT4CTA_iIJ8R2yLg_MZFLVDli");
    db.from("quiz_sessions").select("id").limit(1).then(({error}) => {
